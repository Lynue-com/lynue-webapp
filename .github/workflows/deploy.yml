name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        run: |
          gcloud config set project "${PROJECT_ID}"
          API_URL=$(gcloud secrets versions access latest --secret="API_URL" --project="${PROJECT_ID}")
          NEXT_PUBLIC_API_URL=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_API_URL" --project="${PROJECT_ID}")
          NEXT_PUBLIC_APP_URL=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_APP_URL" --project="${PROJECT_ID}")
          NEXT_PUBLIC_SITE_URL=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_SITE_URL" --project="${PROJECT_ID}")
          NEXT_PUBLIC_GA_MEASUREMENT_ID=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_GA_MEASUREMENT_ID" --project="${PROJECT_ID}")

          if [ -z "$API_URL" ] && [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "ERROR: API_URL or NEXT_PUBLIC_API_URL must be provided."
            exit 1
          fi

          if [ -n "$NEXT_PUBLIC_API_URL" ] && ! echo "$NEXT_PUBLIC_API_URL" | grep -Eq '^https?://'; then
            if [ -z "$NEXT_PUBLIC_APP_URL" ] || ! echo "$NEXT_PUBLIC_APP_URL" | grep -Eq '^https?://'; then
              echo "ERROR: A relative NEXT_PUBLIC_API_URL requires an absolute NEXT_PUBLIC_APP_URL."
              exit 1
            fi
          fi

          echo "Required deploy env vars are present."
          echo "API_URL length=${#API_URL} NEXT_PUBLIC_API_URL length=${#NEXT_PUBLIC_API_URL} NEXT_PUBLIC_APP_URL length=${#NEXT_PUBLIC_APP_URL} NEXT_PUBLIC_SITE_URL length=${#NEXT_PUBLIC_SITE_URL} NEXT_PUBLIC_GA_MEASUREMENT_ID length=${#NEXT_PUBLIC_GA_MEASUREMENT_ID}"

          gcloud run deploy "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --source . \
            --platform managed \
            --region "${REGION}" \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars "API_URL=${API_URL},NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL},NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL},NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL},NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}" \
            --build-env-vars "API_URL=${API_URL},NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL},NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL},NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL},NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}"
